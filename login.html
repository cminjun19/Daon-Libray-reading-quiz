<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인</title>
</head>
<body>

<h2>로그인</h2>

<input type="email" id="email" placeholder="이메일">
<input type="password" id="password" placeholder="비밀번호">

<button onclick="login()">로그인</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBKnK-cqevbXUwHhwvLitEJe-IQOGL6MF8",
authDomain: "daon-libray-reading-quiz.firebaseapp.com",
projectId: "daon-libray-reading-quiz",
storageBucket: "daon-libray-reading-quiz.firebasestorage.app",
messagingSenderId: "65027461102",
appId: "1:65027461102:web:04bc718ff8916cb12808ff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login=function(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)
.then(()=>{
alert("로그인 성공");
window.location.href="index.html";
})
.catch((error)=>{
alert("로그인 실패");
});

}

</script>

</body>
</html>
