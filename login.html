<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인 | 다온 작은도서관</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
}

/* 헤더 */

header{
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.top-bar{
display:grid;
grid-template-columns:1fr 1fr 1fr;
align-items:center;
padding:16px 50px;
}

.library a{
display:flex;
align-items:center;
text-decoration:none;
color:#000;
font-size:32px;
font-weight:bold;
}

.library img{
width:40px;
margin-right:10px;
}

.site-title{
text-align:center;
font-size:20px;
font-weight:bold;
}

.auth{
display:flex;
justify-content:flex-end;
align-items:center;
}

.auth a{
text-decoration:none;
color:black;
font-size:14px;
font-weight:bold;
display:flex;
align-items:center;
gap:6px;
margin-left:18px;
}

.auth img{
width:16px;
}

/* 메뉴 */

.menu{
background:#f1f3f5;
display:flex;
justify-content:space-around;
padding:16px 0;
border-top:1px solid #e0e0e0;
border-bottom:1px solid #e0e0e0;
}

.menu a{
color:#000;
text-decoration:none;
font-weight:bold;
font-size:16px;
display:flex;
align-items:center;
gap:8px;
}

/* 로그인 영역 */

.login-section{
max-width:1000px;
margin:60px auto;
background:white;
border-radius:12px;
padding:40px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.login-tabs{
display:flex;
gap:10px;
margin-bottom:40px;
}

.login-tabs a{
flex:1;
text-align:center;
padding:14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
background:#e9ecef;
color:#555;
}

.login-tabs .active{
background:#16a085;
color:white;
}

.login-box{
display:flex;
align-items:center;
gap:40px;
}

.login-image img{
width:380px;
border-radius:22px;
}

.login-form{
flex:1;
}

.login-title{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.login-desc{
font-size:14px;
color:#666;
margin-bottom:25px;
}

.input-box{
margin-bottom:18px;
}

.input-box input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
}

/* 비밀번호 */

.password-box{
position:relative;
}

.password-box input{
padding-right:40px;
}

.toggle-password{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

/* 로그인 버튼 */

.login-btn{
width:100%;
padding:14px;
background:#16a085;
border:none;
color:white;
font-size:16px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

/* Footer */

footer{
background:#222;
color:#ddd;
padding:10px 40px;
border-top:1px solid #444;
font-size:14px;
}

.footer{
display:grid;
grid-template-columns:1fr 2fr 1fr;
align-items:center;
}

.footer-center{
text-align:center;
}

.footer-right{
text-align:right;
}

</style>

<script>

function togglePassword(){
const pw=document.getElementById("password");
pw.type = pw.type === "password" ? "text" : "password";
}

</script>

</head>

<body>

<header>

<div class="top-bar">

<div class="library">
<a href="index.html">
<img src="아파트 도서관 로고.1.1.png">
다온 작은도서관
</a>
</div>

<div class="site-title">
월간독서퀴즈
</div>

<div class="auth">
<a href="login.html"><img src="로그인.png">로그인</a>
<a href="#" onclick="return false;"><img src="회원가입.png">회원가입</a>
</div>

</div>

<nav class="menu">

<a href="#"><img src="도서관 안내.png">도서관 안내</a>
<a href="#"><img src="이달의 선정도서.png">이달의 선정도서</a>
<a href="#"><img src="당첨자 목록.png">당첨자 목록</a>
<a href="#"><img src="공지사항.png">공지사항</a>

</nav>

</header>

<section class="login-section">

<div class="login-tabs">
<a class="active">로그인</a>
<a href="#" onclick="return false;">회원가입</a>
<a href="#" onclick="return false;">아이디/비밀번호 찾기</a>
</div>

<div class="login-box">

<div class="login-image">
<img src="보안.png">
</div>

<div class="login-form">

<div class="login-title">
다온 작은도서관 월간독서퀴즈 홈페이지에 오신 것을 환영합니다
</div>

<div class="login-desc">
관리자 권한이 있는 사용자에 한하여 접근 및 로그인이 가능합니다.
</div>

<div class="input-box">
<input type="text" placeholder="아이디(이메일)">
</div>

<div class="input-box">
<div class="password-box">
<input type="password" id="password" placeholder="비밀번호">
<span class="toggle-password" onclick="togglePassword()">👁</span>
</div>
</div>

<button class="login-btn">로그인</button>

</div>

</div>

</section>

<footer>

<div class="footer">

<div>
<img src="아파트 도서관 로고.1.1.png" width="40">
</div>

<div class="footer-center">
다온 작은도서관 | 울산광역시 울주군 청량읍 덕하1로 55 지하 1층 커뮤니티센터 내
</div>

<div class="footer-right">
© 2026 Daon Library
</div>

</div>

</footer>

</body>
</html>
