<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인</title>

<style>

/* 동일 헤더 CSS (생략 없이 유지) */

body{margin:0;font-family:Arial;background:#f5f7fb;}

header{background:white;box-shadow:0 2px 8px rgba(0,0,0,0.08);}

.top-bar{display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;padding:16px 50px;}

.library a{display:flex;align-items:center;text-decoration:none;color:#000;font-size:32px;font-weight:bold;}
.library img{width:40px;margin-right:10px;}

.site-title{text-align:center;font-size:20px;font-weight:bold;}

.auth{display:flex;justify-content:flex-end;align-items:center;}
.auth a{display:flex;align-items:center;gap:6px;margin-left:18px;text-decoration:none;color:black;font-size:14px;font-weight:bold;}
.auth img{width:16px;}

.menu{background:#f1f3f5;display:flex;justify-content:space-around;padding:16px 0;border-top:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0;}
.menu a{display:flex;align-items:center;gap:8px;text-decoration:none;color:black;font-weight:bold;}
.menu img{width:20px;}

/* 로그인 */

.login-section{
max-width:1000px;
margin:60px auto;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.login-box{display:flex;gap:40px;align-items:center;}

.login-image img{width:380px;border-radius:20px;}

.input-box{margin-bottom:18px;}
.input-box input{width:100%;padding:12px;border:1px solid #ccc;border-radius:6px;}

.password-box{position:relative;}
.password-box input{padding-right:40px;}

.toggle-password{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

.login-btn{
width:100%;
padding:14px;
background:#16a085;
color:white;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

/* footer 동일 */

footer{background:#222;color:#ddd;padding:10px 40px;}
.footer{display:grid;grid-template-columns:1fr 2fr 1fr;align-items:center;}
.logo-box{background:white;border-radius:10px;width:50px;height:50px;display:flex;align-items:center;justify-content:center;}
.logo-box img{width:36px;}
.footer-center{text-align:center;}
.footer-right{text-align:right;}

</style>

<script>
function togglePassword(){
const pw=document.getElementById("password");
pw.type = pw.type === "password" ? "text" : "password";
}
</script>

</head>

<body>

<header>

<div class="top-bar">

<div class="library">
<a href="index.html">
<img src="아파트 도서관 로고.1.1.png">
다온 작은도서관
</a>
</div>

<div class="site-title">월간독서퀴즈</div>

<div class="auth">
<a href="login.html"><img src="로그인.png">로그인</a>
<a href="#" onclick="return false;"><img src="회원가입.png">회원가입</a>
</div>

</div>

<nav class="menu">
<a href="library.html"><img src="도서관 안내.png">도서관 안내</a>
<a href="#"><img src="이달의 선정도서.png">이달의 선정도서</a>
<a href="#"><img src="당첨자 목록.png">당첨자 목록</a>
<a href="#"><img src="공지사항.png">공지사항</a>
</nav>

</header>

<section class="login-section">

<div class="login-box">

<div class="login-image">
<img src="보안.png">
</div>

<div style="flex:1;">

<div class="input-box">
<input type="text" placeholder="아이디">
</div>

<div class="input-box">
<div class="password-box">
<input type="password" id="password" placeholder="비밀번호">
<span class="toggle-password" onclick="togglePassword()">👁</span>
</div>
</div>

<button class="login-btn">로그인</button>

</div>

</div>

</section>

<footer>

<div class="footer">

<div class="logo-box">
<img src="아파트 도서관 로고.1.1.png">
</div>

<div class="footer-center">
다온 작은도서관 | 울산광역시 울주군 청량읍 덕하1로 55 지하 1층 커뮤니티센터 내
</div>

<div class="footer-right">
© 2026 Daon Library
</div>

</div>

</footer>

</body>
</html>
