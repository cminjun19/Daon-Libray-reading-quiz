<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인 | 다온 작은도서관</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
user-select:none;
}

img{
-webkit-user-drag:none;
user-drag:none;
-webkit-touch-callout:none;
}

/* 헤더 */

header{
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.top-bar{
display:grid;
grid-template-columns:1fr 1fr 1fr;
align-items:center;
padding:16px 50px;
}

.library a{
display:flex;
align-items:center;
text-decoration:none;
color:#000;
font-size:32px;
font-weight:bold;
}

.library img{
width:40px;
margin-right:10px;
}

.site-title{
text-align:center;
font-size:20px;
font-weight:bold;
}

.auth{
display:flex;
justify-content:flex-end;
align-items:center;
}

.auth a{
text-decoration:none;
color:black;
font-size:14px;
font-weight:bold;
display:flex;
align-items:center;
gap:6px;
margin-left:18px;
}

.auth img{
width:16px;
}

/* 메뉴 */

.menu{
background:#f1f3f5;
display:flex;
justify-content:space-around;
padding:16px 0;
border-top:1px solid #e0e0e0;
border-bottom:1px solid #e0e0e0;
}

.menu a{
color:#000;
text-decoration:none;
font-weight:bold;
font-size:16px;
display:flex;
align-items:center;
gap:8px;
}

.menu img{
width:20px;
}

/* 로그인 */

.login-section{
max-width:900px;
margin:70px auto;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.login-box{
display:flex;
align-items:center;
gap:40px;
}

.login-image{
flex:1;
text-align:center;
}

.login-image img{
width:200px;
}

.login-form{
flex:1;
}

.login-title{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

.input-box{
margin-bottom:15px;
}

.input-box input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

.login-btn{
margin-top:10px;
width:100%;
padding:14px;
background:#16a085;
border:none;
color:white;
font-size:16px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

.login-btn:hover{
background:#138d75;
}

.find-btn{
margin-top:12px;
background:none;
border:none;
color:#555;
cursor:pointer;
font-size:14px;
}

/* Footer */

footer{
background:#222;
color:#ddd;
padding:10px 40px;
border-top:1px solid #444;
font-size:14px;
}

.footer{
display:grid;
grid-template-columns:1fr 2fr 1fr;
align-items:center;
}

.footer-logo{
display:flex;
justify-content:flex-start;
}

.logo-box{
background:white;
border-radius:10px;
width:50px;
height:50px;
display:flex;
align-items:center;
justify-content:center;
}

.logo-box img{
width:36px;
}

.footer-center{
text-align:center;
}

.footer-right{
text-align:right;
}

</style>

</head>

<body>

<header>

<div class="top-bar">

<div class="library">
<a href="index.html">
<img src="아파트 도서관 로고.1.1.png">
다온 작은도서관
</a>
</div>

<div class="site-title">
월간독서퀴즈
</div>

<div class="auth">
<a href="login.html">로그인</a>
<a href="signup.html">회원가입</a>
</div>

</div>

<nav class="menu">
<a><img src="도서관 안내.png">도서관 안내</a>
<a><img src="이달의 선정도서.png">이달의 선정도서</a>
<a><img src="당첨자 목록.png">당첨자 목록</a>
<a><img src="공지사항.png">공지사항</a>
</nav>

</header>

<section class="login-section">

<div class="login-box">

<div class="login-image">
<img src="로그인안내.png">
</div>

<div class="login-form">

<div class="login-title">
다온 작은도서관 월간독서퀴즈 홈페이지에 오신 것을 환영합니다
</div>

<div class="input-box">
<input type="text" placeholder="아이디(이메일)">
</div>

<div class="input-box">
<input type="password" placeholder="비밀번호">
</div>

<button class="login-btn">로그인</button>

<button class="find-btn">아이디 / 비밀번호 찾기</button>

</div>

</div>

</section>

<footer>

<div class="footer">

<div class="footer-logo">
<div class="logo-box">
<img src="아파트 도서관 로고.1.1.png">
</div>
</div>

<div class="footer-center">
다온 작은도서관 | 울산광역시 울주군 청량읍 덕하1로 55 지하 1층 커뮤니티센터 내
</div>

<div class="footer-right">
© 2026 Daon Library
</div>

</div>

</footer>

</body>
</html>
