<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>회원가입 | 다온 작은도서관</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
user-select:none;
}

img{
-webkit-user-drag:none;
user-drag:none;
-webkit-touch-callout:none;
}

/* 헤더 */

header{
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.top-bar{
display:grid;
grid-template-columns:1fr 1fr 1fr;
align-items:center;
padding:16px 50px;
}

.library a{
display:flex;
align-items:center;
text-decoration:none;
color:#000;
font-size:32px;
font-weight:bold;
}

.library img{
width:40px;
margin-right:10px;
}

.site-title{
text-align:center;
font-size:20px;
font-weight:bold;
}

.auth{
display:flex;
justify-content:flex-end;
align-items:center;
}

.auth a{
text-decoration:none;
color:black;
font-size:14px;
font-weight:bold;
display:flex;
align-items:center;
gap:6px;
margin-left:18px;
}

.auth img{
width:16px;
}

/* 메뉴 */

.menu{
background:#f1f3f5;
display:flex;
justify-content:space-around;
padding:16px 0;
border-top:1px solid #e0e0e0;
border-bottom:1px solid #e0e0e0;
}

.menu a{
color:#000;
text-decoration:none;
font-weight:bold;
font-size:16px;
display:flex;
align-items:center;
gap:8px;
}

.menu img{
width:20px;
}

/* 회원가입 영역 */

.signup-section{
max-width:900px;
margin:60px auto;
background:white;
border-radius:12px;
padding:40px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.signup-tabs{
display:flex;
gap:10px;
margin-bottom:40px;
}

.signup-tabs a{
flex:1;
text-align:center;
padding:14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
background:#e9ecef;
color:#555;
}

.signup-tabs .active{
background:#16a085;
color:white;
}

/* 입력폼 */

.form-row{
display:flex;
align-items:center;
margin-bottom:18px;
}

.form-label{
width:120px;
font-weight:bold;
}

.form-input{
flex:1;
}

.form-input input,
.form-input select{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

.email-box{
display:flex;
align-items:center;
gap:6px;
}

.phone-box{
display:flex;
align-items:center;
gap:6px;
}

.dong-box{
display:flex;
gap:10px;
}

.signup-btn{
margin-top:25px;
width:100%;
padding:14px;
background:#16a085;
border:none;
color:white;
font-size:16px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

.signup-btn:hover{
background:#138d75;
}

/* Footer */

footer{
background:#222;
color:#ddd;
padding:10px 40px;
border-top:1px solid #444;
font-size:14px;
margin-top:60px;
}

.footer{
display:grid;
grid-template-columns:1fr 2fr 1fr;
align-items:center;
}

.footer-logo{
display:flex;
justify-content:flex-start;
}

.logo-box{
background:white;
border-radius:10px;
width:50px;
height:50px;
display:flex;
align-items:center;
justify-content:center;
}

.logo-box img{
width:36px;
}

.footer-center{
text-align:center;
}

.footer-right{
text-align:right;
}

</style>

<script>

document.addEventListener("contextmenu",function(e){
e.preventDefault();
});

document.addEventListener("keydown",function(e){

if(e.ctrlKey && e.key==="c") e.preventDefault();
if(e.ctrlKey && e.key==="s") e.preventDefault();
if(e.ctrlKey && e.key==="u") e.preventDefault();

});

</script>

</head>

<body>

<header>

<div class="top-bar">

<div class="library">
<a href="index.html">
<img src="아파트 도서관 로고.1.1.png">
다온 작은도서관
</a>
</div>

<div class="site-title">
월간독서퀴즈
</div>

<div class="auth">
<a href="login.html"><img src="로그인.png">로그인</a>
<a href="signup.html"><img src="회원가입.png">회원가입</a>
</div>

</div>

<nav class="menu">

<a href="#"><img src="도서관 안내.png">도서관 안내</a>
<a href="#"><img src="이달의 선정도서.png">이달의 선정도서</a>
<a href="#"><img src="당첨자 목록.png">당첨자 목록</a>
<a href="#"><img src="공지사항.png">공지사항</a>

</nav>

</header>

<section class="signup-section">

<div class="signup-tabs">
<a href="login.html">로그인</a>
<a class="active">회원가입</a>
<a>아이디/비밀번호 찾기</a>
</div>

<!-- 이메일 -->

<div class="form-row">
<div class="form-label">이메일</div>

<div class="form-input email-box">
<input type="text">
<span>@</span>
<input type="text">
<select>
<option>예: 직접입력</option>
<option>naver.com</option>
<option>gmail.com</option>
<option>daum.net</option>
</select>
</div>
</div>

<!-- 비밀번호 -->

<div class="form-row">
<div class="form-label">비밀번호</div>
<div class="form-input">
<input type="password">
</div>
</div>

<!-- 비밀번호 확인 -->

<div class="form-row">
<div class="form-label">비밀번호 확인</div>
<div class="form-input">
<input type="password">
</div>
</div>

<!-- 이름 -->

<div class="form-row">
<div class="form-label">이름</div>
<div class="form-input">
<input type="text">
</div>
</div>

<!-- 동/호수 -->

<div class="form-row">
<div class="form-label">동/호수</div>

<div class="form-input dong-box">
<input type="text" placeholder="000동">
<input type="text" placeholder="0000호">
</div>

</div>

<!-- 휴대폰 -->

<div class="form-row">
<div class="form-label">휴대폰</div>

<div class="form-input phone-box">
<input type="text" value="010" style="width:70px">
<span>-</span>
<input type="text" style="width:100px">
<span>-</span>
<input type="text" style="width:100px">
</div>

</div>

<button class="signup-btn">회원가입</button>

</section>

<footer>

<div class="footer">

<div class="footer-logo">
<div class="logo-box">
<img src="아파트 도서관 로고.1.1.png">
</div>
</div>

<div class="footer-center">
다온 작은도서관 | 울산광역시 울주군 청량읍 덕하1로 55 지하 1층 커뮤니티센터 내
</div>

<div class="footer-right">
© 2026 Daon Library
</div>

</div>

</footer>

</body>
</html>
