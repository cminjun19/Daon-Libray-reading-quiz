<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBKnK-cqevbXUwHhwvLitEJe-IQOGL6MF8",
  authDomain: "daon-libray-reading-quiz.firebaseapp.com",
  projectId: "daon-libray-reading-quiz",
  storageBucket: "daon-libray-reading-quiz.firebasestorage.app",
  messagingSenderId: "65027461102",
  appId: "1:65027461102:web:04bc718ff8916cb12808ff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.loginUser = function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("로그인 성공!");
      location.href = "admin.html";
    })
    .catch((error) => {
      alert("로그인 실패: " + error.message);
    });
}

window.togglePassword = function(){
  const pw = document.getElementById("password");
  pw.type = pw.type === "password" ? "text" : "password";
}
</script>
