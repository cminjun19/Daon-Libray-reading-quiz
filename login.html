<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인 | 다온 작은도서관</title>

<style>
/* (기존 CSS 그대로 유지) */
body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
}

/* 생략 없이 그대로 써도 됨 */
</style>

<!-- ✅ Firebase SDK -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* 네가 준 설정 */
const firebaseConfig = {
  apiKey: "AIzaSyBKnK-cqevbXUwHhwvLitEJe-IQOGL6MF8",
  authDomain: "daon-libray-reading-quiz.firebaseapp.com",
  projectId: "daon-libray-reading-quiz",
  storageBucket: "daon-libray-reading-quiz.firebasestorage.app",
  messagingSenderId: "65027461102",
  appId: "1:65027461102:web:04bc718ff8916cb12808ff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* 로그인 함수 */
window.loginUser = function(){
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

signInWithEmailAndPassword(auth, email, password)
.then((userCredential) => {
alert("로그인 성공!");
location.href = "admin.html";
})
.catch((error) => {
alert("로그인 실패: " + error.message);
});
}

/* 비밀번호 보기 */
window.togglePassword = function(){
const pw = document.getElementById("password");
pw.type = pw.type === "password" ? "text" : "password";
}

</script>

</head>

<body>

<header>
<!-- (헤더 기존 그대로 유지) -->
</header>

<section class="login-section">

<div class="login-tabs">
<a class="active">로그인</a>
<a href="#" onclick="return false;">회원가입</a>
<a href="#" onclick="return false;">아이디/비밀번호 찾기</a>
</div>

<div class="login-box">

<div class="login-image">
<img src="보안.png" style="width:400px; border-radius:20px;">
</div>

<div class="login-form">

<div class="login-title">
다온 작은도서관 월간독서퀴즈 홈페이지에 오신 것을 환영합니다
</div>

<div class="login-desc">
관리자만 로그인 가능합니다.
</div>

<div class="input-box">
<input type="text" id="email" placeholder="아이디(이메일)">
</div>

<div class="input-box">
<div class="password-box">
<input type="password" id="password" placeholder="비밀번호">
<span onclick="togglePassword()">👁</span>
</div>
</div>

<button onclick="loginUser()">로그인</button>

</div>

</div>

</section>

</body>
</html>
