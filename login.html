<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인 | 다온 작은도서관</title>

<link rel="stylesheet" href="style.css">

<style>

/* 로그인 전용 */

.login-section{
max-width:1000px;
margin:60px auto;
background:white;
border-radius:12px;
padding:40px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.login-box{
display:flex;
gap:40px;
align-items:center;
}

.login-image img{
width:380px;
border-radius:20px;
}

.login-form{
flex:1;
}

.input-box{
margin-bottom:18px;
}

.input-box input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
}

.password-box{
position:relative;
}

.password-box input{
padding-right:40px;
}

.toggle-password{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

.login-btn{
width:100%;
padding:14px;
background:#16a085;
border:none;
color:white;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

</style>

<script>
function togglePassword(){
const pw=document.getElementById("password");
pw.type = pw.type === "password" ? "text" : "password";
}
</script>

</head>

<body>

<header>

<div class="top-bar">

<div class="library">
<a href="index.html">
<img src="아파트 도서관 로고.1.1.png">
다온 작은도서관
</a>
</div>

<div class="site-title">
월간독서퀴즈
</div>

<div class="auth">
<a href="login.html"><img src="로그인.png">로그인</a>
<a href="#" onclick="return false;"><img src="회원가입.png">회원가입</a>
</div>

</div>

<nav class="menu">
<a href="library.html"><img src="도서관 안내.png">도서관 안내</a>
<a href="#"><img src="이달의 선정도서.png">이달의 선정도서</a>
<a href="#"><img src="당첨자 목록.png">당첨자 목록</a>
<a href="#"><img src="공지사항.png">공지사항</a>
</nav>

</header>

<section class="login-section">

<div class="login-box">

<div class="login-image">
<img src="보안.png">
</div>

<div class="login-form">

<h2>로그인</h2>
<p>관리자 권한이 있는 사용자에 한하여 접근 및 로그인이 가능합니다.</p>

<div class="input-box">
<input type="text" placeholder="아이디">
</div>

<div class="input-box">
<div class="password-box">
<input type="password" id="password" placeholder="비밀번호">
<span class="toggle-password" onclick="togglePassword()">👁</span>
</div>
</div>

<button class="login-btn">로그인</button>

</div>

</div>

</section>

<footer>

<div class="footer">

<div class="logo-box">
<img src="아파트 도서관 로고.1.1.png">
</div>

<div class="footer-center">
다온 작은도서관 | 울산광역시 울주군 청량읍 덕하1로 55 지하 1층 커뮤니티센터 내
</div>

<div class="footer-right">
© 2026 Daon Library
</div>

</div>

</footer>

</body>
</html>
