<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인 | 다온 작은도서관</title>

<!-- Firebase (안정 버전) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBKnK-cqevbXUwHhwvLitEJe-IQOGL6MF8",
  authDomain: "daon-libray-reading-quiz.firebaseapp.com",
  projectId: "daon-libray-reading-quiz",
};

firebase.initializeApp(firebaseConfig);

// 로그인
function loginUser(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(() => {
      alert("로그인 성공!");
      location.href = "admin.html";
    })
    .catch((error) => {
      alert("로그인 실패: " + error.message);
    });
}

// 비밀번호 보기
function togglePassword(){
  const pw = document.getElementById("password");
  pw.type = pw.type === "password" ? "text" : "password";
}
</script>

<style>
body{margin:0;font-family:Arial;background:#f5f7fb;}
.login-section{max-width:500px;margin:100px auto;background:white;padding:40px;border-radius:10px;}
.input-box{margin-bottom:15px;}
input{width:100%;padding:10px;}
button{width:100%;padding:12px;background:#16a085;color:white;border:none;}
</style>

</head>

<body>

<div class="login-section">

<h2>로그인</h2>

<div class="input-box">
<input type="email" id="email" placeholder="이메일">
</div>

<div class="input-box">
<input type="password" id="password" placeholder="비밀번호">
</div>

<button onclick="loginUser()">로그인</button>

</div>

</body>
</html>
