<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인 | 다온 작은도서관 월간독서퀴즈</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
user-select:none;
}

img{
-webkit-user-drag:none;
user-drag:none;
-webkit-touch-callout:none;
}

/* 헤더 */

header{
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.top-bar{
display:grid;
grid-template-columns:1fr 1fr 1fr;
align-items:center;
padding:16px 50px;
}

.library a{
display:flex;
align-items:center;
text-decoration:none;
color:#000;
font-size:32px;
font-weight:bold;
}

.library img{
width:40px;
margin-right:10px;
}

.site-title{
text-align:center;
font-size:20px;
font-weight:bold;
}

.auth{
display:flex;
justify-content:flex-end;
align-items:center;
}

.auth a{
text-decoration:none;
color:black;
font-size:14px;
font-weight:bold;
display:flex;
align-items:center;
gap:6px;
margin-left:18px;
}

.auth img{
width:16px;
}

/* 메뉴 */

.menu{
background:#f1f3f5;
display:flex;
justify-content:space-around;
padding:16px 0;
border-top:1px solid #e0e0e0;
border-bottom:1px solid #e0e0e0;
}

.menu a{
color:#000;
text-decoration:none;
font-weight:bold;
font-size:16px;
display:flex;
align-items:center;
gap:8px;
}

.menu img{
width:20px;
}

/* 배너 */

.banner{
background:linear-gradient(135deg,#5f72ff,#9b59b6);
color:white;
text-align:center;
padding:70px 20px;
}

.banner-title{
font-size:34px;
font-weight:bold;
}

/* 로그인 영역 */

.login-area{
max-width:420px;
margin:60px auto;
background:white;
padding:40px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
text-align:center;
}

/* 입력창 */

.email-box{
display:flex;
align-items:center;
gap:8px;
margin-bottom:16px;
}

.email-box input{
padding:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
}

.email-id{
flex:1;
}

.email-domain{
flex:1;
}

.email-box select{
padding:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
}

/* 비밀번호 */

.password-box input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
margin-bottom:16px;
}

/* 포커스 효과 */

input:focus, select:focus{
outline:none;
border-color:#5f72ff;
box-shadow:0 0 5px rgba(95,114,255,0.4);
}

/* 로그인 버튼 */

.login-btn{
width:100%;
padding:14px;
background:linear-gradient(135deg,#5f72ff,#6c5ce7);
color:white;
border:none;
border-radius:8px;
font-weight:bold;
font-size:15px;
cursor:pointer;
transition:0.2s;
}

.login-btn:hover{
transform:translateY(-2px);
box-shadow:0 5px 12px rgba(0,0,0,0.15);
}

/* 회원가입 링크 */

.signup-link{
margin-top:18px;
font-size:14px;
}

.signup-link a{
color:#5f72ff;
text-decoration:none;
font-weight:bold;
}

/* Footer */

footer{
background:#222;
color:#ddd;
padding:10px 40px;
border-top:1px solid #444;
font-size:14px;
}

.footer{
display:grid;
grid-template-columns:1fr 2fr 1fr;
align-items:center;
}

.footer-logo{
display:flex;
justify-content:flex-start;
}

.logo-box{
background:white;
border-radius:10px;
width:50px;
height:50px;
display:flex;
align-items:center;
justify-content:center;
}

.logo-box img{
width:36px;
}

.footer-center{
text-align:center;
}

.footer-right{
text-align:right;
}

</style>

<script>

function domainSelect(select){

const domain = document.getElementById("emailDomain");

if(select.value === ""){
domain.value="";
domain.disabled=false;
domain.focus();
}
else{
domain.value=select.value;
domain.disabled=true;
}

}

</script>

</head>

<body>

<header>

<div class="top-bar">

<div class="library">
<a href="index.html">
<img src="아파트 도서관 로고.1.1.png">
다온 작은도서관
</a>
</div>

<div class="site-title">
월간독서퀴즈
</div>

<div class="auth">
<a href="login.html"><img src="로그인.png">로그인</a>
<a href="signup.html"><img src="회원가입.png">회원가입</a>
</div>

</div>

<nav class="menu">

<a href="#"><img src="도서관 안내.png">도서관 안내</a>
<a href="#"><img src="이달의 선정도서.png">이달의 선정도서</a>
<a href="#"><img src="당첨자 목록.png">당첨자 목록</a>
<a href="#"><img src="공지사항.png">공지사항</a>

</nav>

</header>

<section class="banner">

<div class="banner-title">
로그인
</div>

</section>

<section class="login-area">

<div class="email-box">

<input class="email-id" type="text" placeholder="example">

<span>@</span>

<input id="emailDomain" class="email-domain" type="text" placeholder="">

<select onchange="domainSelect(this)">
<option value="">직접입력</option>
<option value="naver.com">naver.com</option>
<option value="gmail.com">gmail.com</option>
<option value="daum.net">daum.net</option>
<option value="kakao.com">kakao.com</option>
</select>

</div>

<div class="password-box">
<input type="password" placeholder="비밀번호">
</div>

<button class="login-btn">로그인</button>

<div class="signup-link">
계정이 없으신가요? <a href="signup.html">회원가입</a>
</div>

</section>

<footer>

<div class="footer">

<div class="footer-logo">
<div class="logo-box">
<img src="아파트 도서관 로고.1.1.png">
</div>
</div>

<div class="footer-center">
다온 작은도서관 | 울산광역시 울주군 청량읍 덕하1로 55 지하 1층 커뮤니티센터 내
</div>

<div class="footer-right">
© 2026 Daon Library
</div>

</div>

</footer>

</body>
</html>
