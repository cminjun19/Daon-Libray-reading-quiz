<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인 | 다온 작은도서관</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f7fb;
}

.login-section{
max-width:1000px;
margin:60px auto;
background:white;
border-radius:12px;
padding:40px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.login-tabs{
display:flex;
gap:10px;
margin-bottom:40px;
}

.login-tabs a{
flex:1;
text-align:center;
padding:14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
background:#e9ecef;
color:#555;
}

.login-tabs .active{
background:#16a085;
color:white;
}

.login-box{
display:flex;
align-items:center;
gap:40px;
}

.login-image img{
width:360px;
border-radius:20px;
}

.login-form{
flex:1;
}

.login-title{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.login-desc{
font-size:14px;
color:#666;
margin-bottom:25px;
}

.input-box{
margin-bottom:18px;
}

.input-box input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

.password-box{
position:relative;
}

.password-box input{
padding-right:40px;
}

.toggle-password{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

.login-btn{
width:100%;
padding:14px;
background:#16a085;
border:none;
color:white;
font-size:16px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

footer{
background:#222;
color:#ddd;
padding:10px 40px;
}

.footer{
display:grid;
grid-template-columns:1fr 2fr 1fr;
align-items:center;
}

.footer-center{
text-align:center;
}

.footer-right{
text-align:right;
}

</style>

<script>

function togglePassword(){
const pw=document.getElementById("password");
pw.type = pw.type === "password" ? "text" : "password";
}

</script>

</head>

<body>

<section class="login-section">

<div class="login-tabs">
<a class="active">로그인</a>
<a href="#" onclick="return false;">회원가입</a>
<a href="#" onclick="return false;">아이디/비밀번호 찾기</a>
</div>

<div class="login-box">

<div class="login-image">
<img src="보안.png">
</div>

<div class="login-form">

<div class="login-title">
다온 작은도서관 월간독서퀴즈 홈페이지에 오신 것을 환영합니다
</div>

<div class="login-desc">
관리자 권한이 있는 사용자에 한하여 접근 및 로그인이 가능합니다.
</div>

<div class="input-box">
<input type="text" placeholder="아이디(이메일)">
</div>

<div class="input-box">
<div class="password-box">
<input type="password" id="password" placeholder="비밀번호">
<span class="toggle-password" onclick="togglePassword()">👁</span>
</div>
</div>

<button class="login-btn">로그인</button>

</div>

</div>

</section>

<footer>

<div class="footer">

<div>
<img src="아파트 도서관 로고.1.1.png" width="40">
</div>

<div class="footer-center">
다온 작은도서관 | 울산광역시 울주군 청량읍 덕하1로 55 지하 1층 커뮤니티센터 내
</div>

<div class="footer-right">
© 2026 Daon Library
</div>

</div>

</footer>

</body>
</html>
