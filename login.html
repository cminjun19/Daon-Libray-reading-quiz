<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인 | 다온 작은도서관</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBKnK-cqevbXUwHhwvLitEJe-IQOGL6MF8",
  authDomain: "daon-libray-reading-quiz.firebaseapp.com",
  projectId: "daon-libray-reading-quiz",
  storageBucket: "daon-libray-reading-quiz.firebasestorage.app",
  messagingSenderId: "65027461102",
  appId: "1:65027461102:web:04bc718ff8916cb12808ff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 로그인 함수
window.loginUser = function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("로그인 성공!");
      location.href = "admin.html"; // 로그인 성공 시 이동
    })
    .catch((error) => {
      alert("로그인 실패: " + error.message);
    });
}

// 비밀번호 보기
window.togglePassword = function(){
  const pw = document.getElementById("password");
  pw.type = pw.type === "password" ? "text" : "password";
}

</script>

<style>

/* 기존 스타일 유지 */

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
}

/* 헤더 */
header{
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.top-bar{
display:grid;
grid-template-columns:1fr 1fr 1fr;
align-items:center;
padding:16px 50px;
}

.library a{
display:flex;
align-items:center;
text-decoration:none;
color:#000;
font-size:32px;
font-weight:bold;
}

.library img{
width:40px;
margin-right:10px;
}

.site-title{
text-align:center;
font-size:20px;
font-weight:bold;
}

.auth{
display:flex;
justify-content:flex-end;
align-items:center;
}

.auth a{
text-decoration:none;
color:black;
font-size:14px;
font-weight:bold;
display:flex;
align-items:center;
gap:6px;
margin-left:18px;
}

.auth img{
width:16px;
}

/* 메뉴 */
.menu{
background:#f1f3f5;
display:flex;
justify-content:space-around;
padding:16px 0;
border-top:1px solid #e0e0e0;
border-bottom:1px solid #e0e0e0;
}

.menu a{
color:#000;
text-decoration:none;
font-weight:bold;
font-size:16px;
display:flex;
align-items:center;
gap:8px;
}

.menu img{
width:20px;
}

/* 로그인 */
.login-section{
max-width:1000px;
margin:60px auto;
background:white;
border-radius:12px;
padding:40px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.login-tabs{
display:flex;
gap:10px;
margin-bottom:40px;
}

.login-tabs a{
flex:1;
text-align:center;
padding:14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
background:#e9ecef;
color:#555;
}

.login-tabs .active{
background:#16a085;
color:white;
}

.login-box{
display:flex;
align-items:center;
gap:40px;
}

.login-image img{
width:400px;
border-radius:20px;
}

.login-form{
flex:1;
}

.input-box{
margin-bottom:18px;
}

.input-box input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
}

.password-box{
position:relative;
}

.password-box input{
padding-right:40px;
}

.toggle-password{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

.login-btn{
width:100%;
padding:14px;
background:#16a085;
border:none;
color:white;
font-size:16px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

footer{
background:#222;
color:#ddd;
padding:10px 40px;
}

</style>

</head>

<body>

<header>
<div class="top-bar">

<div class="library">
<a href="index.html">
<img src="아파트 도서관 로고.1.1.png">
다온 작은도서관
</a>
</div>

<div class="site-title">
월간독서퀴즈
</div>

<div class="auth">
<a href="login.html"><img src="로그인.png">로그인</a>
<a href="#" onclick="return false;"><img src="회원가입.png">회원가입</a>
</div>

</div>

<nav class="menu">
<a href="library.html"><img src="도서관 안내.png">도서관 안내</a>
<a href="#"><img src="이달의 선정도서.png">이달의 선정도서</a>
<a href="#"><img src="당첨자 목록.png">당첨자 목록</a>
<a href="#"><img src="공지사항.png">공지사항</a>
</nav>
</header>

<section class="login-section">

<div class="login-box">

<div class="login-image">
<img src="보안.png">
</div>

<div class="login-form">

<div class="input-box">
<input type="email" id="email" placeholder="아이디(이메일)">
</div>

<div class="input-box">
<div class="password-box">
<input type="password" id="password" placeholder="비밀번호">
<span class="toggle-password" onclick="togglePassword()">👁</span>
</div>
</div>

<button class="login-btn" onclick="loginUser()">로그인</button>

</div>

</div>

</section>

</body>
</html>
