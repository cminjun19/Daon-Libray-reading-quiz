<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>도서관 안내 | 다온 작은도서관</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
}

/* 헤더 */
header{
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.top-bar{
display:grid;
grid-template-columns:1fr 1fr 1fr;
align-items:center;
padding:16px 50px;
}

.library a{
display:flex;
align-items:center;
text-decoration:none;
color:#000;
font-size:32px;
font-weight:bold;
}

.library img{
width:40px;
margin-right:10px;
}

.site-title{
text-align:center;
font-size:20px;
font-weight:bold;
}

.auth{
display:flex;
justify-content:flex-end;
align-items:center;
}

.auth a{
text-decoration:none;
color:black;
font-size:14px;
font-weight:bold;
display:flex;
align-items:center;
gap:6px;
margin-left:18px;
}

.auth img{
width:16px;
}

/* 메뉴 */
.menu{
background:#f1f3f5;
display:flex;
justify-content:space-around;
padding:16px 0;
border-top:1px solid #e0e0e0;
border-bottom:1px solid #e0e0e0;
}

.menu a{
color:#000;
text-decoration:none;
font-weight:bold;
font-size:16px;
display:flex;
align-items:center;
gap:8px;
}

.menu img{
width:20px;
}

/* 본문 */
.container{
max-width:1000px;
margin:50px auto;
}

/* 카드 */
.card{
background:white;
border-radius:12px;
padding:30px;
margin-bottom:25px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.card h3{
margin-bottom:15px;
color:#16a085;
}

/* 이용 대상 */
.user-grid{
display:flex;
gap:20px;
margin-top:10px;
}

.user-box{
flex:1;
background:#f8f9fa;
padding:25px;
border-radius:14px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.u-icon{
font-size:28px;
margin-bottom:10px;
}

.u-title{
font-weight:bold;
font-size:16px;
margin-bottom:6px;
}

.u-desc{
font-size:14px;
color:#555;
}

/* 대출 */
.loan-box{
display:flex;
flex-direction:column;
gap:10px;
}

.loan-item{
background:#f8f9fa;
padding:12px;
border-radius:8px;
display:flex;
justify-content:space-between;
font-weight:bold;
}

.loan-item span{
color:#16a085;
}

/* 시설 */
.facility{
display:flex;
gap:20px;
margin-top:10px;
}

.fac-box{
flex:1;
background:#f8f9fa;
padding:20px;
border-radius:12px;
text-align:center;
}

.icon{
font-size:26px;
margin-bottom:10px;
}

.fac-title{
font-weight:bold;
font-size:16px;
margin-bottom:6px;
}

.fac-desc{
font-size:14px;
margin-bottom:6px;
}

.fac-sub{
font-size:12px;
color:#777;
}

/* 운영시간 */
.schedule{
width:100%;
border-collapse:separate;
border-spacing:10px 12px;
}

.schedule th{
background:#16a085;
color:white;
padding:12px;
border-radius:10px;
}

.schedule td{
padding:12px;
background:#fff;
border-radius:10px;
text-align:center;
}

.time{
font-weight:bold;
background:#eef7f5 !important;
}

.schedule tr{
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

/* 상태 */
.badge{
padding:6px 10px;
border-radius:20px;
font-size:13px;
font-weight:bold;
display:inline-block;
}

.on{ background:#d1f2eb; color:#16a085; }
.off{ background:#eee; color:#777; }
.closed{ background:#fdecea; color:#e74c3c; }
.partial{ background:#fff3cd; color:#d68910; }

/* 안내 UI */
.info-grid{
display:flex;
gap:20px;
margin-top:20px;
}

.info-card{
flex:1;
padding:20px;
border-radius:14px;
background:#ffffff;
box-shadow:0 6px 15px rgba(0,0,0,0.06);
}

.info-title{
font-weight:bold;
margin-bottom:15px;
font-size:17px;
}

/* 휴관일 */
.holiday-list{
display:flex;
flex-direction:column;
gap:12px;
}

.holiday-item{
display:flex;
align-items:center;
gap:12px;
background:#f8f9fa;
padding:12px;
border-radius:10px;
}

.h-icon{
font-size:22px;
}

.h-title{
font-weight:bold;
font-size:14px;
}

.h-desc{
font-size:12px;
color:#777;
}

/* 이용 안내 */
.alert{
padding:14px;
border-radius:10px;
font-size:14px;
font-weight:bold;
margin-bottom:12px;
color:#000; /* 🔥 글씨 검정 */
}

/* 노랑 */
.alert.main{ 
background:#fff3cd; 
}

/* 초록 */
.alert.sub{ 
background:#e8f8f5; 
}

/* 노랑 */
.alert.gray{ 
background:#fff3cd; 
}

/* footer */
footer{
background:#222;
color:#ddd;
padding:10px 40px;
margin-top:50px;
font-size:14px;
}

.footer{
display:grid;
grid-template-columns:1fr 2fr 1fr;
align-items:center;
}

.logo-box{
background:white;
border-radius:10px;
width:50px;
height:50px;
display:flex;
align-items:center;
justify-content:center;
}

.logo-box img{
width:36px;
}

.footer-center{
text-align:center;
}

.footer-right{
text-align:right;
}
</style>
</head>

<body>
<!-- (HTML 구조는 기존과 동일, 생략 없이 그대로 유지됨) -->
</body>
</html>
