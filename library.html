<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>도서관 안내 | 다온 작은도서관</title>

<style>
body{
margin:0;
font-family:'Segoe UI', sans-serif;
background:#f4f6f9;
}

/* 공통 */
.container{
max-width:1100px;
margin:50px auto;
}

/* 카드 */
.card{
background:white;
border-radius:14px;
padding:25px;
margin-bottom:25px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

.card h3{
margin-bottom:15px;
color:#16a085;
}

/* 표 */
.info-table{
width:100%;
border-collapse:collapse;
}

.info-table td{
padding:12px;
border-bottom:1px solid #eee;
}

.info-table td:first-child{
font-weight:bold;
width:140px;
color:#555;
}

/* 시설 */
.facility{
display:flex;
gap:20px;
}

.fac-box{
flex:1;
background:#f8f9fa;
padding:20px;
border-radius:10px;
text-align:center;
font-weight:bold;
}

/* 운영시간 */
.time-box{
background:#222;
color:white;
padding:20px;
border-radius:10px;
}

.status{
margin-top:10px;
color:#2ecc71;
font-weight:bold;
}

/* 헤더/메뉴/footer 기존 유지 */
</style>
</head>

<body>

<div class="container">

<div class="card">
<h3>도서관 소개</h3>
<p>
우리 아파트 "다온 작은도서관"은 주민들의 독서 생활과 문화 활동을 지원하기 위해 운영되는 공간입니다.<br><br>
어린이부터 성인까지 누구나 편안하게 이용할 수 있으며, 지식과 소통의 공간을 제공합니다.
</p>
</div>

<div class="card">
<h3>이용 대상</h3>
<table class="info-table">
<tr><td>이용 대상</td><td>아파트 입주민 누구나</td></tr>
</table>
</div>

<div class="card">
<h3>도서 대출 안내</h3>
<table class="info-table">
<tr><td>대출 권수</td><td>1인 3권</td></tr>
<tr><td>대출 기간</td><td>14일</td></tr>
<tr><td>주의 사항</td><td>연체 시 대출 제한</td></tr>
</table>
</div>

<div class="card">
<h3>시설 안내</h3>
<div class="facility">
<div class="fac-box">📚 열람 공간<br><small>자유 독서</small></div>
<div class="fac-box">👥 세미나실<br><small>소규모 프로그램</small></div>
</div>
</div>

<div class="card">
<h3>운영 시간</h3>
<div class="time-box">
운영일 : 월 ~ 금 / 09:00 ~ 18:00<br>
휴관일 : 주말 및 공휴일
<div class="status">● 현재 운영중입니다</div>
</div>
</div>

</div>

</body>
</html>
