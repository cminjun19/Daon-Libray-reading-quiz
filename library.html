<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>도서관 안내 | 다온 작은도서관</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
}

/* 카드 */
.card{
background:white;
border-radius:12px;
padding:30px;
margin:30px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.card h3{
color:#16a085;
}

/* 이용 대상 */
.user-grid{
display:flex;
gap:20px;
margin-top:10px;
}

.user-box{
flex:1;
background:#f8f9fa;
padding:25px;
border-radius:14px;
text-align:center;
}

/* 운영시간 */
.schedule{
width:100%;
border-collapse:separate;
border-spacing:10px;
margin-top:15px;
}

.schedule th{
background:#16a085;
color:white;
padding:10px;
border-radius:8px;
}

.schedule td{
background:white;
padding:10px;
border-radius:8px;
text-align:center;
}

.time{
font-weight:bold;
background:#eef7f5;
}

/* 안내 */
.alert{
padding:14px;
border-radius:10px;
font-weight:bold;
margin-bottom:12px;
color:#000;
}

.alert.main{background:#fff3cd;}
.alert.sub{background:#e8f8f5;}
.alert.gray{background:#fff3cd;}
</style>
</head>

<body>

<div class="card">
<h3>👥 이용 대상</h3>
<div class="user-grid">
<div class="user-box">
🏢 아파트 입주민<br>
에일린의뜰2차 입주민 누구나 이용 가능
</div>

<div class="user-box">
📌 이용 방법<br>
도서관 방문 후 자유롭게 이용
</div>
</div>
</div>

<div class="card">
<h3>⏰ 운영시간</h3>

<table class="schedule">
<tr>
<th>시간</th><th>화</th><th>수</th><th>목</th><th>금</th>
</tr>

<tr>
<td class="time">19:00~20:00</td>
<td>운영</td>
<td>미운영</td>
<td>운영</td>
<td>운영</td>
</tr>

<tr>
<td class="time">20:00~21:00</td>
<td>운영</td>
<td>운영</td>
<td>운영</td>
<td>운영</td>
</tr>
</table>

</div>

<div class="card">
<h3>📌 이용 안내</h3>
<div class="alert main">⚠️ 운영시간 변동 가능</div>
<div class="alert sub">✔ 방문 전 확인 권장</div>
<div class="alert gray">📵 도서관 내 정숙 유지</div>
<div class="alert sub">📚 도서 훼손 금지</div>
</div>

</body>
</html>
