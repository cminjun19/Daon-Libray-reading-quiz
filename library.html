<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>도서관 안내 | 다온 작은도서관</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
}

/* 헤더 */
header{
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.top-bar{
display:grid;
grid-template-columns:1fr 1fr 1fr;
align-items:center;
padding:16px 50px;
}

.library a{
display:flex;
align-items:center;
text-decoration:none;
color:#000;
font-size:32px;
font-weight:bold;
}

.library img{
width:40px;
margin-right:10px;
}

.site-title{
text-align:center;
font-size:20px;
font-weight:bold;
}

.auth{
display:flex;
justify-content:flex-end;
align-items:center;
}

.auth a{
text-decoration:none;
color:black;
font-size:14px;
font-weight:bold;
display:flex;
align-items:center;
gap:6px;
margin-left:18px;
}

.auth img{
width:16px;
}

/* 메뉴 */
.menu{
background:#f1f3f5;
display:flex;
justify-content:space-around;
padding:16px 0;
border-top:1px solid #e0e0e0;
border-bottom:1px solid #e0e0e0;
}

.menu a{
color:#000;
text-decoration:none;
font-weight:bold;
font-size:16px;
display:flex;
align-items:center;
gap:8px;
}

.menu img{
width:20px;
}

/* 본문 */
.container{
max-width:1000px;
margin:50px auto;
}

/* 카드 */
.card{
background:white;
border-radius:12px;
padding:30px;
margin-bottom:25px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.card h3{
margin-bottom:15px;
color:#16a085;
}

/* 시설 */
.facility{
display:flex;
gap:20px;
margin-top:10px;
}

.fac-box{
flex:1;
background:#f8f9fa;
padding:20px;
border-radius:12px;
text-align:center;
font-weight:bold;
}

.fac-box small{
display:block;
margin-top:5px;
font-weight:normal;
color:#666;
}

/* ===== 운영시간 ===== */

.schedule{
width:100%;
border-collapse:separate;
border-spacing:10px 12px;
}

.schedule th{
background:#16a085;
color:white;
padding:12px;
border-radius:10px;
}

.schedule td{
padding:12px;
background:#fff;
border-radius:10px;
text-align:center;
}

.time{
font-weight:bold;
background:#eef7f5 !important;
}

.schedule tr{
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

/* ===== 정보 패널 (핵심 업그레이드) ===== */

.info-section{
margin-top:25px;
display:flex;
flex-direction:column;
gap:20px;
}

.info-block{
background:#ffffff;
border-radius:14px;
box-shadow:0 6px 15px rgba(0,0,0,0.06);
overflow:hidden;
}

/* 헤더 */
.info-header{
display:flex;
align-items:center;
gap:10px;
padding:14px 18px;
font-weight:bold;
font-size:16px;
border-bottom:1px solid #eee;
}

.info-icon{
font-size:18px;
}

/* 바디 */
.info-body{
padding:15px;
}

/* 항목 */
.info-item{
display:flex;
justify-content:space-between;
padding:12px 10px;
border-bottom:1px solid #f0f0f0;
font-size:14px;
}

.info-item:last-child{
border-bottom:none;
}

.label{
color:#666;
}

.value{
font-weight:bold;
}

/* 안내 */
.notice-item{
background:#f4f6f7;
padding:12px;
border-radius:8px;
margin-bottom:10px;
font-size:14px;
}

.notice-item.primary{
background:#fdecea;
color:#c0392b;
font-weight:bold;
}

/* 색상 */
.holiday .info-header{
background:#fdecea;
color:#e74c3c;
}

.notice .info-header{
background:#e8f8f5;
color:#16a085;
}

/* footer */
footer{
background:#222;
color:#ddd;
padding:10px 40px;
margin-top:50px;
font-size:14px;
}

.footer{
display:grid;
grid-template-columns:1fr 2fr 1fr;
align-items:center;
}

.logo-box{
background:white;
border-radius:10px;
width:50px;
height:50px;
display:flex;
align-items:center;
justify-content:center;
}

.logo-box img{
width:36px;
}

.footer-center{
text-align:center;
}

.footer-right{
text-align:right;
}
</style>
</head>

<body>

<header>
<div class="top-bar">

<div class="library">
<a href="#">
<img src="아파트 도서관 로고.1.1.png">
다온 작은도서관
</a>
</div>

<div class="site-title">월간독서퀴즈</div>

<div class="auth">
<a href="#"><img src="로그인.png">로그인</a>
<a href="#"><img src="회원가입.png">회원가입</a>
</div>

</div>

<nav class="menu">
<a href="#">도서관 안내</a>
<a href="#">이달의 선정도서</a>
<a href="#">당첨자 목록</a>
<a href="#">공지사항</a>
</nav>
</header>

<div class="container">

<div class="card">
<h3>🏢 시설 안내</h3>
<div class="facility">
<div class="fac-box">열람실<small>자유롭게 독서 가능</small></div>
<div class="fac-box">독서실<small>조용한 학습 공간</small></div>
<div class="fac-box">세미나실<small>프로그램 진행</small></div>
</div>
</div>

<div class="card">
<h3>⏰ 운영 시간</h3>

<table class="schedule">
<tr>
<th>시간</th>
<th>화</th>
<th>수</th>
<th>목</th>
<th>금</th>
</tr>

<tr>
<td class="time">14:00~16:00</td>
<td>운영</td><td>운영</td><td>운영</td><td>부분</td>
</tr>

<tr>
<td class="time">19:00~21:00</td>
<td>운영</td><td>운영</td><td>운영</td><td>운영</td>
</tr>

</table>

<!-- 🔥 업그레이드된 정보 패널 -->
<div class="info-section">

<div class="info-block holiday">
<div class="info-header">
<span class="info-icon">🚫</span>
휴관일 안내
</div>

<div class="info-body">
<div class="info-item">
<span class="label">정기 휴관</span>
<span class="value">매주 월요일</span>
</div>
<div class="info-item">
<span class="label">주말</span>
<span class="value">토·일</span>
</div>
<div class="info-item">
<span class="label">공휴일</span>
<span class="value">전체 휴관</span>
</div>
</div>
</div>

<div class="info-block notice">
<div class="info-header">
<span class="info-icon">📌</span>
이용 안내
</div>

<div class="info-body">
<div class="notice-item primary">
운영시간은 변경될 수 있습니다.
</div>
<div class="notice-item">
방문 전 확인해주세요.
</div>
</div>
</div>

</div>

</div>

</div>

<footer>
<div class="footer">
<div class="logo-box"><img src="아파트 도서관 로고.1.1.png"></div>
<div class="footer-center">다온 작은도서관</div>
<div class="footer-right">© 2026</div>
</div>
</footer>

</body>
</html>
