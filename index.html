<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>다온 작은도서관 월간독서퀴즈</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6fb;
color:#333;
}

/* ===== 헤더 ===== */
header{
display:flex;
align-items:center;
justify-content:space-between;
padding:25px 50px;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

/* 로고 + 이름 */
.logo{
display:flex;
align-items:center;
font-size:22px;
font-weight:bold;
color:#1e293b;
}

.logo img{
width:45px;
margin-right:12px;
}

/* 메뉴 */
.menu{
display:flex;
gap:25px;
}

.menu a{
text-decoration:none;
font-weight:bold;
color:#374151;
font-size:16px;
}

.menu a:hover{
color:#4f46e5;
}

/* 로그인 영역 */
.auth{
font-size:15px;
}

.auth a{
text-decoration:none;
color:#374151;
margin-left:10px;
font-weight:bold;
}

.auth a:hover{
color:#4f46e5;
}

/* ===== 홈 메인 ===== */

.hero{
text-align:center;
padding:140px 20px;
background:linear-gradient(180deg,#ffffff,#eef2ff);
}

.hero h1{
font-size:52px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
color:#555;
}

/* 퀴즈 시작 버튼 */

.start-btn{
margin-top:35px;
background:#4f46e5;
color:white;
padding:16px 36px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
box-shadow:0 6px 15px rgba(79,70,229,0.3);
}

.start-btn:hover{
background:#4338ca;
}

</style>
</head>

<body>

<header>

<div class="logo">
<img src="logo.png">
다온 작은도서관 월간독서퀴즈
</div>

<nav class="menu">
<a href="#">홈</a>
<a href="#">퀴즈</a>
<a href="#">공지사항</a>
<a href="#">문의</a>
</nav>

<div class="auth">
<a href="#">로그인</a> |
<a href="#">회원가입</a>
</div>

</header>

<div class="hero">

<h1>📚 월간 독서 퀴즈</h1>

<p>책을 읽고 퀴즈를 풀어보세요.</p>
<p>매달 새로운 독서 퀴즈가 준비되어 있습니다.</p>

<button class="start-btn">퀴즈 시작</button>

</div>

</body>
</html>
