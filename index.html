<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Daon Library</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

/* 상단 제목 */
header{
background:#1e293b;
padding:40px;
font-size:40px;
font-weight:bold;
}

/* 메뉴 */
nav{
background:#334155;
padding:15px;
}

nav button{
background:#475569;
color:white;
border:none;
padding:10px 20px;
margin:5px;
font-size:16px;
border-radius:8px;
}

/* 홈 화면 */
.hero{
padding:100px 20px;
}

.hero h1{
font-size:50px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
opacity:0.8;
}
</style>

</head>

<body>

<header>
📚 Daon Library
</header>

<nav>
<button>홈</button>
<button>소개</button>
<button>퀴즈</button>
<button>연락</button>
</nav>

<div class="hero">
<h1>환영합니다!</h1>
<p>이곳은 독서 퀴즈 사이트입니다.</p>
<p>책을 읽고 퀴즈를 풀어보세요.</p>
</div>

</body>
</html>
