<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Daon Library Quiz</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;

}

/* 상단 제목 */
header{
padding:40px;
font-size:40px;
background:#1e293b;
}

padding:10px 20px;

cursor:pointer;
}

/* 내용 영역 */
section{
padding:60px;
font-size:20px;
}
</style>

</head>

<body>

<header>
Daon Library Quiz
</header>

<nav>
<button>홈</button>
<button>소개</button>

<button>연락</button>
</nav>

<section>
<p>여기에 사이트 내용을 넣을 수 있습니다.</p>
</section>

</body>
</html>
