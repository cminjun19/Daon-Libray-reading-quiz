<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>다온 작은도서관 월간독서퀴즈</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
}

/* ===== 헤더 ===== */

header{
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.top-bar{
display:grid;
grid-template-columns: 1fr 1fr 1fr;
align-items:center;
padding:18px 50px;
}

/* 도서관 이름 (버튼) */

.library a{
display:flex;
align-items:center;
text-decoration:none;
color:#000;
font-size:16px; /* 작게 */
font-weight:bold;
}

.library img{
width:38px;
margin-right:10px;
}

/* 가운데 제목 */

.site-title{
text-align:center;
font-size:30px; /* 크게 */
font-weight:bold;
}

/* 로그인 */

.auth{
display:flex;
justify-content:flex-end;
align-items:center;
}

.auth a{
text-decoration:none;
color:#000;
font-weight:bold;
display:flex;
align-items:center;
gap:6px;
margin-left:18px;
}

.auth img{
width:18px;
height:18px;
}

/* ===== 메뉴 버튼 ===== */

.menu{
background:#f1f3f5;
display:flex;
justify-content:space-around;
padding:16px 0;
border-top:1px solid #e0e0e0;
border-bottom:1px solid #e0e0e0;
}

.menu a{
color:#000;
text-decoration:none;
font-weight:bold;
font-size:16px;
display:flex;
align-items:center;
gap:8px;
}

.menu img{
width:20px;
height:20px;
}

.menu a:hover{
color:#2c7be5;
}

/* ===== 메인 ===== */

.hero{
text-align:center;
padding:120px 20px;
}

.hero h1{
font-size:48px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
color:#555;
}

.start-btn{
margin-top:30px;
padding:15px 35px;
background:#4f46e5;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.start-btn:hover{
background:#4338ca;
}

</style>
</head>

<body>

<header>

<div class="top-bar">

<!-- 왼쪽 (홈 버튼) -->

<div class="library">
<a href="index.html">
<img src="아파트 도서관 로고.1.1.png">
다온 작은도서관
</a>
</div>

<!-- 가운데 제목 -->

<div class="site-title">
월간독서퀴즈
</div>

<!-- 로그인 -->

<div class="auth">

<a href="#">
<img src="로그인.png">
로그인
</a>

<a href="#">
<img src="회원가입.png">
회원가입
</a>

</div>

</div>

<nav class="menu">

<a href="#">
<img src="도서관 안내.png">
도서관 안내
</a>

<a href="#">
<img src="이달의 선정도서.png">
이달의 선정도서
</a>

<a href="#">
<img src="당첨자 목록.png">
당첨자 목록
</a>

<a href="#">
<img src="공지사항.png">
공지사항
</a>

</nav>

</header>

<section class="hero">

<h1>독서 퀴즈에 참여해보세요</h1>

<p>매달 새로운 책과 퀴즈가 준비되어 있습니다.</p>

<button class="start-btn">퀴즈 시작</button>

</section>

</body>
</html>
