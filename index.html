<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>다온 작은도서관 월간독서퀴즈</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
}

/* ===== 헤더 ===== */

header{
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.top-bar{
display:grid;
grid-template-columns: 1fr 1fr 1fr;
align-items:center;
padding:25px 50px;
}

/* 왼쪽 도서관 */

.library{
display:flex;
align-items:center;
font-size:20px;
font-weight:bold;
}

.library img{
width:40px;
margin-right:10px;
}

/* 가운데 제목 */

.site-title{
text-align:center;
font-size:26px;
font-weight:bold;
}

/* 오른쪽 로그인 */

.auth{
display:flex;
justify-content:flex-end;
align-items:center;
}

.auth a{
text-decoration:none;
color:#333;
font-weight:bold;
display:flex;
align-items:center;
gap:6px;
margin-left:18px;
}

.auth img{
width:18px;
height:18px;
}

/* ===== 메뉴 ===== */

.menu{
background:#18a7a0;
display:flex;
justify-content:space-around;
padding:18px 0;
}

.menu a{
color:white;
text-decoration:none;
font-weight:bold;
font-size:16px;
}

.menu a:hover{
opacity:0.8;
}

/* ===== 메인 ===== */

.hero{
text-align:center;
padding:120px 20px;
}

.hero h1{
font-size:48px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
color:#555;
}

.start-btn{
margin-top:30px;
padding:15px 35px;
background:#4f46e5;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.start-btn:hover{
background:#4338ca;
}

</style>
</head>

<body>

<header>

<div class="top-bar">

<!-- 왼쪽 도서관 -->

<div class="library">
<img src="아파트 도서관 로고.1.1.png">
다온 작은도서관
</div>

<!-- 가운데 제목 -->

<div class="site-title">
월간독서퀴즈
</div>

<!-- 오른쪽 로그인 -->

<div class="auth">

<a href="#">
<img src="로그인.png">
로그인
</a>

<a href="#">
<img src="회원가입.png">
회원가입
</a>

</div>

</div>

<nav class="menu">

<a href="#">프로그램</a>
<a href="#">독서퀴즈</a>
<a href="#">공지사항</a>
<a href="#">이용안내</a>

</nav>

</header>

<section class="hero">

<h1>독서 퀴즈에 참여해보세요</h1>

<p>매달 새로운 책과 퀴즈가 준비되어 있습니다.</p>

<button class="start-btn">퀴즈 시작</button>

</section>

</body>
</html>
