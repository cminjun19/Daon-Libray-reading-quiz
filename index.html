<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>다온 작은도서관 월간독서퀴즈</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* 상단 바 */
header{
display:flex;
justify-content:space-between;
align-items:center;
background:#1e293b;
padding:15px 30px;
}

/* 로고 + 이름 */
.logo{
display:flex;
align-items:center;
font-size:20px;
font-weight:bold;
}

.logo img{
width:35px;
margin-right:10px;
}

/* 로그인 버튼 */
.auth button{
background:#475569;
color:white;
border:none;
padding:8px 15px;
margin-left:10px;
border-radius:6px;
cursor:pointer;
}

/* 홈 화면 */
.hero{
text-align:center;
padding:120px 20px;
}

.hero h1{
font-size:48px;
margin-bottom:20px;
}
</style>

</head>

<body>

<header>

<div class="logo">
<img src="아파트 도서관 로고.1.1.png">
다온 작은도서관 월간독서퀴즈
</div>

<div class="auth">
<button>로그인</button>
<button>회원가입</button>
</div>

</header>

<div class="hero">
<h1>환영합니다</h1>
<p>다온 작은도서관 월간 독서 퀴즈 사이트입니다.</p>
</div>

</body>
</html>
