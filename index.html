<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>다온 작은도서관 월간독서퀴즈</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
background:#f5f7fb;
}

/* 헤더 */

header{
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.top-bar{
display:grid;
grid-template-columns:1fr 1fr 1fr;
align-items:center;
padding:16px 50px;
}

.library{
display:flex;
align-items:center;
font-size:32px;
font-weight:bold;
}

.library img{
width:40px;
margin-right:10px;
}

.site-title{
text-align:center;
font-size:20px;
font-weight:bold;
}

.auth{
display:flex;
justify-content:flex-end;
gap:20px;
}

.auth a{
text-decoration:none;
color:black;
font-weight:bold;
}

/* 메뉴 */

.menu{
background:#f1f3f5;
display:flex;
justify-content:space-around;
padding:16px 0;
border-top:1px solid #e0e0e0;
border-bottom:1px solid #e0e0e0;
}

.menu a{
text-decoration:none;
color:black;
font-weight:bold;
}

/* 배너 */

.banner{
height:300px;
background:linear-gradient(135deg,#16a085,#2ecc71);
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:34px;
font-weight:bold;
}

/* 메뉴 카드 */

.card-section{
max-width:1100px;
margin:60px auto;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:0 20px;
}

.card{
background:white;
border-radius:12px;
padding:30px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
transition:0.2s;
cursor:pointer;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.card img{
width:40px;
margin-bottom:10px;
}

.card-title{
font-size:18px;
font-weight:bold;
}

/* footer */

footer{
background:#222;
color:#ddd;
padding:10px 40px;
}

.footer{
display:grid;
grid-template-columns:1fr 2fr 1fr;
align-items:center;
}

.footer-center{
text-align:center;
}

.footer-right{
text-align:right;
}

</style>
</head>

<body>

<header>

<div class="top-bar">

<div class="library">
<img src="아파트 도서관 로고.1.1.png">
다온 작은도서관
</div>

<div class="site-title">
월간독서퀴즈
</div>

<div class="auth">
<a href="login.html">로그인</a>
<a href="#">회원가입</a>
</div>

</div>

<nav class="menu">
<a href="#">도서관 안내</a>
<a href="#">이달의 선정도서</a>
<a href="#">당첨자 목록</a>
<a href="#">공지사항</a>
</nav>

</header>

<section class="banner">
다온 작은도서관 월간독서퀴즈
</section>

<section class="card-section">

<div class="card">
<img src="도서관 안내.png">
<div class="card-title">도서관 안내</div>
</div>

<div class="card">
<img src="이달의 선정도서.png">
<div class="card-title">이달의 선정도서</div>
</div>

<div class="card">
<img src="당첨자 목록.png">
<div class="card-title">당첨자 목록</div>
</div>

<div class="card">
<img src="공지사항.png">
<div class="card-title">공지사항</div>
</div>

</section>

<footer>

<div class="footer">

<div>
<img src="아파트 도서관 로고.1.1.png" width="40">
</div>

<div class="footer-center">
다온 작은도서관 | 울산광역시 울주군 청량읍 덕하1로 55 지하 1층 커뮤니티센터 내
</div>

<div class="footer-right">
© 2026 Daon Library
</div>

</div>

</footer>

</body>
</html>
