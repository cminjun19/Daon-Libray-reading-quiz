<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>다온 작은도서관 월간독서퀴즈</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6fb;
color:#333;
}

/* 상단 바 */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:white;
border-bottom:1px solid #ddd;
}

/* 로고 + 이름 */
.logo{
display:flex;
align-items:center;
font-size:20px;
font-weight:bold;
}

.logo img{
width:35px;
margin-right:10px;
}

/* 로그인 글자 */
.auth a{
text-decoration:none;
color:#333;
font-weight:bold;
margin:0 5px;
}

.auth a:hover{
text-decoration:underline;
}

/* 메뉴 */
.menu{
background:#eef2ff;
padding:12px 40px;
}

.menu a{
margin-right:20px;
text-decoration:none;
color:#333;
font-weight:bold;
}

/* 홈 메인 */
.hero{
text-align:center;
padding:120px 20px;
background:linear-gradient(180deg,#ffffff,#eef2ff);
}

.hero h1{
font-size:48px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
color:#555;
}

/* 시작 버튼 */
.start-btn{
margin-top:30px;
background:#4f46e5;
color:white;
padding:15px 30px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<div class="logo">
<img src="logo.png">
다온 작은도서관 월간독서퀴즈
</div>

<div class="auth">
<a href="#">로그인</a>
|
<a href="#">회원가입</a>
</div>

</header>

<nav class="menu">
<a href="#">홈</a>
<a href="#">퀴즈</a>
<a href="#">공지사항</a>
<a href="#">문의</a>
</nav>

<div class="hero">

<h1>📚 월간 독서 퀴즈</h1>

<p>책을 읽고 퀴즈를 풀어보세요.</p>
<p>매달 새로운 독서 퀴즈가 준비되어 있습니다.</p>

<button class="start-btn">퀴즈 시작</button>

</div>

</body>
</html>
