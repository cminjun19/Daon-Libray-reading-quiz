<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>다온 작은도서관 월간 독서퀴즈</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
}

/* ===== 헤더 ===== */

header{
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 50px;
}

.logo{
display:flex;
align-items:center;
font-size:22px;
font-weight:bold;
}

.logo img{
width:45px;
margin-right:10px;
}

/* 로그인 */

.auth{
display:flex;
align-items:center;
}

.auth a{
text-decoration:none;
color:#333;
font-weight:bold;
margin:0 8px;
}

.divider{
color:#999;
}

/* ===== 버튼 메뉴 ===== */

.menu{
background:#18a7a0;
display:flex;
justify-content:space-around;
padding:20px 0;
}

.menu a{
color:white;
text-decoration:none;
font-size:16px;
font-weight:bold;
display:flex;
align-items:center;
gap:8px;
}

.menu a:hover{
opacity:0.8;
}

/* ===== 메인 ===== */

.hero{
text-align:center;
padding:120px 20px;
}

.hero h1{
font-size:48px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
color:#555;
}

.start-btn{
margin-top:30px;
padding:15px 35px;
background:#4f46e5;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.start-btn:hover{
background:#4338ca;
}

</style>

</head>

<body>

<header>

<div class="top-bar">

<div class="logo">
<img src="logo.png">
다온 작은도서관 월간독서퀴즈
</div>

<div class="auth">
<a href="#">로그인</a>
<span class="divider">|</span>
<a href="#">회원가입</a>
</div>

</div>

<nav class="menu">

<a href="#">
📖 프로그램
</a>

<a href="#">
🧠 독서퀴즈
</a>

<a href="#">
📢 안내사항
</a>

<a href="#">
📍 이용안내
</a>

</nav>

</header>

<section class="hero">

<h1>월간 독서 퀴즈</h1>

<p>책을 읽고 퀴즈를 풀어보세요.</p>

<button class="start-btn">퀴즈 시작</button>

</section>

</body>
</html>
