<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>다온 작은도서관 월간독서퀴즈</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
}

/* 헤더 */

header{
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.top-bar{
display:grid;
grid-template-columns:1fr 1fr 1fr;
align-items:center;
padding:16px 50px;
}

.library a{
display:flex;
align-items:center;
text-decoration:none;
color:#000;
font-size:32px;
font-weight:bold;
}

.library img{
width:38px;
margin-right:10px;
}

.site-title{
text-align:center;
font-size:20px;
font-weight:bold;
}

.auth{
display:flex;
justify-content:flex-end;
align-items:center;
}

.auth a{
text-decoration:none;
color:#000;
font-size:14px;
font-weight:bold;
display:flex;
align-items:center;
gap:6px;
margin-left:18px;
}

.auth img{
width:16px;
}

/* 메뉴 */

.menu{
background:#f1f3f5;
display:flex;
justify-content:space-around;
padding:16px 0;
border-top:1px solid #e0e0e0;
border-bottom:1px solid #e0e0e0;
}

.menu a{
color:#000;
text-decoration:none;
font-weight:bold;
font-size:16px;
display:flex;
align-items:center;
gap:8px;
}

.menu img{
width:20px;
}

/* 배너 */

.banner{
background:linear-gradient(135deg,#5f72ff,#9b59b6);
color:white;
text-align:center;
padding:120px 20px;
}

.banner-title{
font-size:40px;
font-weight:bold;
margin-bottom:12px;
}

.banner-text{
font-size:30px;
}

/* 배너 아래 구분선 */

.section-divider{
height:60px;
background:linear-gradient(to bottom,#f5f7fb,#ffffff);
}

/* 카드 영역 */

.cards-section{
text-align:center;
padding-top:20px;
}

.cards-title{
font-size:24px;
font-weight:bold;
margin-bottom:30px;
}

/* 카드 */

.cards{
max-width:1100px;
margin:0 auto 70px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:0 20px;
}

.card{
background:white;
padding:30px;
border-radius:12px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
transition:0.25s;
cursor:pointer;
}

.card:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 12px 25px rgba(0,0,0,0.12);
}

.card img{
width:40px;
margin-bottom:10px;
}

.card h3{
margin:10px 0;
}

.card p{
color:#666;
font-size:14px;
line-height:1.6;
}

</style>
</head>

<body>

<header>

<div class="top-bar">

<div class="library">
<a href="index.html">
<img src="아파트 도서관 로고.1.1.png">
다온 작은도서관
</a>
</div>

<div class="site-title">
월간독서퀴즈
</div>

<div class="auth">

<a href="#">
<img src="로그인.png">
로그인
</a>

<a href="#">
<img src="회원가입.png">
회원가입
</a>

</div>

</div>

<nav class="menu">

<a href="#">
<img src="도서관 안내.png">
도서관 안내
</a>

<a href="#">
<img src="이달의 선정도서.png">
이달의 선정도서
</a>

<a href="#">
<img src="당첨자 목록.png">
당첨자 목록
</a>

<a href="#">
<img src="공지사항.png">
공지사항
</a>

</nav>

</header>

<section class="banner">

<div class="banner-title">
다온 작은도서관 월간독서퀴즈 홈페이지에 오신것을 환영합니다.
</div>

<div class="banner-text">
책을 읽고 퀴즈에 참여해보세요
</div>

</section>

<div class="section-divider"></div>

<section class="cards-section">

<div class="cards-title">
빠른 메뉴
</div>

<div class="cards">

<div class="card">
<img src="도서관 안내.png">
<h3>도서관 안내</h3>
<p>다온 작은도서관 이용 방법을 확인할 수 있습니다.</p>
</div>

<div class="card">
<img src="이달의 선정도서.png">
<h3>이달의 선정도서</h3>
<p>이번 달 월간독서퀴즈 선정 도서를 확인할 수 있습니다.</p>
</div>

<div class="card">
<img src="당첨자 목록.png">
<h3>당첨자 목록</h3>
<p>월간독서퀴즈 당첨자를 확인할 수 있습니다.</p>
</div>

<div class="card">
<img src="공지사항.png">
<h3>공지사항</h3>
<p>월간독서퀴즈의 새로운 소식을 확인할 수 있습니다.</p>
</div>

</div>

</section>

</body>
</html>
