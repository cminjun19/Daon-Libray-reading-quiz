<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>다온 작은도서관 월간독서퀴즈</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
}

/* ===== 헤더 ===== */

header{
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.top-bar{
display:grid;
grid-template-columns: 1fr 1fr 1fr;
align-items:center;
padding:18px 50px;
}

.library a{
display:flex;
align-items:center;
text-decoration:none;
color:#000;
font-size:30px;
font-weight:bold;
}

.library img{
width:38px;
margin-right:10px;
}

.site-title{
text-align:center;
font-size:24px;
font-weight:bold;
}

.auth{
display:flex;
justify-content:flex-end;
align-items:center;
}

.auth a{
text-decoration:none;
color:#000;
font-weight:bold;
font-size:14px;
display:flex;
align-items:center;
gap:6px;
margin-left:18px;
}

.auth img{
width:16px;
height:16px;
}

/* ===== 메뉴 ===== */

.menu{
background:#f1f3f5;
display:flex;
justify-content:space-around;
padding:16px 0;
border-top:1px solid #e0e0e0;
border-bottom:1px solid #e0e0e0;
}

.menu a{
color:#000;
text-decoration:none;
font-weight:bold;
font-size:16px;
display:flex;
align-items:center;
gap:8px;
}

.menu img{
width:20px;
}

/* ===== 메인 배너 ===== */

.main-banner{
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
text-align:center;
padding:120px 20px;
}

.main-banner h1{
font-size:48px;
margin-bottom:15px;
}

.main-banner p{
font-size:20px;
opacity:0.9;
}

/* ===== 카드 영역 ===== */

.content{
padding:60px 40px;
max-width:1100px;
margin:auto;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:12px;
padding:30px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
transition:0.2s;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
margin-bottom:10px;
font-size:20px;
}

.card p{
color:#666;
line-height:1.5;
}

</style>
</head>

<body>

<header>

<div class="top-bar">

<div class="library">
<a href="index.html">
<img src="아파트 도서관 로고.1.1.png">
다온 작은도서관
</a>
</div>

<div class="site-title">
월간독서퀴즈
</div>

<div class="auth">

<a href="#">
<img src="로그인.png">
로그인
</a>

<a href="#">
<img src="회원가입.png">
회원가입
</a>

</div>

</div>

<nav class="menu">

<a href="#">
<img src="도서관 안내.png">
도서관 안내
</a>

<a href="#">
<img src="이달의 선정도서.png">
이달의 선정도서
</a>

<a href="#">
<img src="당첨자 목록.png">
당첨자 목록
</a>

<a href="#">
<img src="공지사항.png">
공지사항
</a>

</nav>

</header>

<!-- ===== 메인 배너 ===== -->

<section class="main-banner">

<h1>다온 작은도서관 독서퀴즈</h1>

<p>책을 읽고 퀴즈에 참여해보세요</p>

</section>

<!-- ===== 카드 영역 ===== -->

<section class="content">

<div class="cards">

<div class="card">
<h3>📚 월간 독서퀴즈</h3>
<p>
매달 새로운 선정도서를 읽고
독서 퀴즈에 참여할 수 있습니다.
</p>
</div>

<div class="card">
<h3>📖 이달의 선정도서</h3>
<p>
매달 선정된 도서를 확인하고
책을 읽은 뒤 퀴즈에 참여하세요.
</p>
</div>

<div class="card">
<h3>🏆 당첨자 발표</h3>
<p>
정답자 중 추첨을 통해
당첨자가 선정됩니다.
</p>
</div>

</div>

</section>

</body>
</html>
