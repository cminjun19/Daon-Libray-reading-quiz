<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>다온 작은도서관 월간독서퀴즈</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* 상단 바 */
header{
display:flex;
justify-content:space-between;
align-items:center;
background:#1e293b;
padding:15px 30px;
}

/* 사이트 이름 */
.logo{
font-size:20px;
font-weight:bold;
}

/* 로그인 영역 */
.auth{
font-size:14px;
}

.auth button{
background:#475569;
color:white;
border:none;
padding:8px 15px;
margin-left:10px;
border-radius:6px;
cursor:pointer;
}

/* 홈 화면 */
.hero{
text-align:center;
padding:120px 20px;
}

.hero h1{
font-size:48px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
opacity:0.8;
}
</style>

</head>

<body>

<header>
<div class="logo">다온 작은도서관 월간독서퀴즈</div>

<div class="auth">
<button>로그인</button>
<button>회원가입</button>
</div>
</header>

<div class="hero">
<h1>환영합니다</h1>
<p>다온 작은도서관 월간 독서 퀴즈 사이트입니다.</p>
</div>

</body>
</html>
