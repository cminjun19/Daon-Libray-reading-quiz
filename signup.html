<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>회원가입</title>
</head>
<body>

<h2>회원가입</h2>

<input type="email" id="email" placeholder="이메일">
<input type="password" id="password" placeholder="비밀번호">

<button onclick="signup()">회원가입</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBKnK-cqevbXUwHhwvLitEJe-IQOGL6MF8",
authDomain: "daon-libray-reading-quiz.firebaseapp.com",
projectId: "daon-libray-reading-quiz",
storageBucket: "daon-libray-reading-quiz.firebasestorage.app",
messagingSenderId: "65027461102",
appId: "1:65027461102:web:04bc718ff8916cb12808ff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup=function(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)
.then(()=>{
alert("회원가입 성공");
window.location.href="login.html";
})
.catch((error)=>{
alert("회원가입 실패");
});

}

</script>

</body>
</html>
