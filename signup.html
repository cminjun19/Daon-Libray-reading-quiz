<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>회원가입 | 다온 작은도서관 월간독서퀴즈</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
user-select:none;
}

img{
-webkit-user-drag:none;
user-drag:none;
-webkit-touch-callout:none;
}

/* 헤더 */

header{
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.top-bar{
display:grid;
grid-template-columns:1fr 1fr 1fr;
align-items:center;
padding:16px 50px;
}

.library a{
display:flex;
align-items:center;
text-decoration:none;
color:#000;
font-size:32px;
font-weight:bold;
}

.library img{
width:40px;
margin-right:10px;
}

.site-title{
text-align:center;
font-size:20px;
font-weight:bold;
}

.auth{
display:flex;
justify-content:flex-end;
align-items:center;
}

.auth a{
text-decoration:none;
color:black;
font-size:14px;
font-weight:bold;
display:flex;
align-items:center;
gap:6px;
margin-left:18px;
}

.auth img{
width:16px;
}

/* 메뉴 */

.menu{
background:#f1f3f5;
display:flex;
justify-content:space-around;
padding:16px 0;
border-top:1px solid #e0e0e0;
border-bottom:1px solid #e0e0e0;
}

.menu a{
color:#000;
text-decoration:none;
font-weight:bold;
font-size:16px;
display:flex;
align-items:center;
gap:8px;
}

.menu img{
width:20px;
}

/* 배너 */

.banner{
background:linear-gradient(135deg,#5f72ff,#9b59b6);
color:white;
text-align:center;
padding:80px 20px;
}

.banner-title{
font-size:36px;
font-weight:bold;
}

/* 회원가입 영역 */

.signup-area{
max-width:520px;
margin:60px auto;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
text-align:center;
}

.signup-area input{
width:100%;
padding:12px;
margin-bottom:14px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

.signup-btn{
width:100%;
padding:12px;
background:#5f72ff;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.login-link{
margin-top:15px;
font-size:14px;
}

.login-link a{
color:#5f72ff;
text-decoration:none;
}

/* Footer */

footer{
background:#222;
color:#ddd;
padding:10px 40px;
border-top:1px solid #444;
font-size:14px;
}

.footer{
display:grid;
grid-template-columns:1fr 2fr 1fr;
align-items:center;
}

.footer-logo{
display:flex;
justify-content:flex-start;
}

.logo-box{
background:white;
border-radius:10px;
width:50px;
height:50px;
display:flex;
align-items:center;
justify-content:center;
}

.logo-box img{
width:36px;
}

.footer-center{
text-align:center;
}

.footer-right{
text-align:right;
}

</style>

</head>

<body>

<header>

<div class="top-bar">

<div class="library">
<a href="index.html">
<img src="아파트 도서관 로고.1.1.png">
다온 작은도서관
</a>
</div>

<div class="site-title">
월간독서퀴즈
</div>

<div class="auth">
<a href="login.html"><img src="로그인.png">로그인</a>
<a href="signup.html"><img src="회원가입.png">회원가입</a>
</div>

</div>

<nav class="menu">
<a href="#"><img src="도서관 안내.png">도서관 안내</a>
<a href="#"><img src="이달의 선정도서.png">이달의 선정도서</a>
<a href="#"><img src="당첨자 목록.png">당첨자 목록</a>
<a href="#"><img src="공지사항.png">공지사항</a>
</nav>

</header>

<section class="banner">
<div class="banner-title">회원가입</div>
</section>

<section class="signup-area">

<input type="text" placeholder="이름">

<input type="email" placeholder="이메일">

<input type="password" placeholder="비밀번호">

<input type="password" placeholder="비밀번호 확인">

<button class="signup-btn">회원가입</button>

<div class="login-link">
이미 계정이 있으신가요? <a href="login.html">로그인</a>
</div>

</section>

<footer>

<div class="footer">

<div class="footer-logo">
<div class="logo-box">
<img src="아파트 도서관 로고.1.1.png">
</div>
</div>

<div class="footer-center">
다온 작은도서관 | 울산광역시 울주군 청량읍 덕하1로 55 지하 1층 커뮤니티센터 내
</div>

<div class="footer-right">
© 2026 Daon Library
</div>

</div>

</footer>

</body>
</html>
