<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>회원가입</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f7fb;
}

.signup-box{
max-width:500px;
margin:60px auto;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.row{
margin-bottom:18px;
}

label{
display:block;
font-weight:bold;
margin-bottom:6px;
}

input,select{
padding:12px;
border:1px solid #ccc;
border-radius:6px;
}

.email{
display:flex;
gap:6px;
}

.phone{
display:flex;
gap:6px;
}

.dongho{
display:flex;
gap:6px;
}

button{
width:100%;
padding:14px;
background:#5f72ff;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

/* footer */

footer{
background:#222;
color:#ddd;
padding:10px 40px;
border-top:1px solid #444;
font-size:14px;
}

.footer{
display:grid;
grid-template-columns:1fr 2fr 1fr;
align-items:center;
}

.footer-logo{
display:flex;
justify-content:flex-start;
}

.logo-box{
background:white;
border-radius:10px;
width:50px;
height:50px;
display:flex;
align-items:center;
justify-content:center;
}

.logo-box img{
width:36px;
}

.footer-center{
text-align:center;
}

.footer-right{
text-align:right;
}

</style>
</head>

<body>

<div class="signup-box">

<div class="row">
<label>이메일</label>
<div class="email">
<input style="width:120px;">
@
<input style="width:120px;">
<select>
<option>예: 직접입력</option>
<option>naver.com</option>
<option>gmail.com</option>
</select>
</div>
</div>

<div class="row">
<label>비밀번호</label>
<input type="password" style="width:100%;">
</div>

<div class="row">
<label>비밀번호 확인</label>
<input type="password" style="width:100%;">
</div>

<div class="row">
<label>이름</label>
<input style="width:100%;">
</div>

<div class="row">
<label>동/호수</label>
<div class="dongho">
<input placeholder="000동">
<input placeholder="0000호">
</div>
</div>

<div class="row">
<label>휴대폰</label>
<div class="phone">
<input value="010" style="width:70px;">
-
<input style="width:90px;">
-
<input style="width:90px;">
</div>
</div>

<button>
회원가입
</button>

</div>

<footer>

<div class="footer">

<div class="footer-logo">
<div class="logo-box">
<img src="아파트 도서관 로고.1.1.png">
</div>
</div>

<div class="footer-center">
다온 작은도서관 | 울산광역시 울주군 청량읍 덕하1로 55 지하 1층 커뮤니티센터 내
</div>

<div class="footer-right">
© 2026 Daon Library
</div>

</div>

</footer>

</body>
</html>
