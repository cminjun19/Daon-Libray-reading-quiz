<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>회원가입 | 다온 작은도서관</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
}

.signup-section{
max-width:600px;
margin:70px auto;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.form-row{
display:flex;
align-items:center;
margin-bottom:18px;
justify-content:center;
}

.form-label{
width:120px;
font-weight:bold;
}

.form-input input,
.form-input select{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

.email-box{
display:flex;
align-items:center;
gap:6px;
}

.phone-box{
display:flex;
align-items:center;
gap:6px;
}

.signup-btn{
margin-top:25px;
width:100%;
padding:14px;
background:#16a085;
border:none;
color:white;
font-size:16px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<section class="signup-section">

<div class="form-row">
<div class="form-label">이메일</div>

<div class="form-input email-box">
<input type="text">
<span>@</span>
<input type="text">
<select>
<option>직접입력</option>
<option>naver.com</option>
<option>gmail.com</option>
<option>daum.net</option>
</select>
</div>

</div>

<div class="form-row">
<div class="form-label">비밀번호</div>
<div class="form-input">
<input type="password">
</div>
</div>

<div class="form-row">
<div class="form-label">비밀번호 확인</div>
<div class="form-input">
<input type="password">
</div>
</div>

<div class="form-row">
<div class="form-label">이름</div>
<div class="form-input">
<input type="text">
</div>
</div>

<div class="form-row">
<div class="form-label">동 / 호수</div>

<div class="form-input">
<input type="text" placeholder="000">동
<input type="text" placeholder="0000">호
</div>

</div>

<div class="form-row">
<div class="form-label">휴대폰</div>

<div class="form-input phone-box">
<input type="text" value="010" readonly style="width:70px">
<span>-</span>
<input type="text" style="width:90px">
<span>-</span>
<input type="text" style="width:90px">
</div>

</div>

<button class="signup-btn">회원가입</button>

</section>

</body>
</html>
