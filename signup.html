<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>회원가입 | 다온 작은도서관</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
user-select:none;
}

img{
-webkit-user-drag:none;
user-drag:none;
-webkit-touch-callout:none;
}

/* 헤더 */

header{
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.top-bar{
display:grid;
grid-template-columns:1fr 1fr 1fr;
align-items:center;
padding:16px 50px;
}

.library a{
display:flex;
align-items:center;
text-decoration:none;
color:#000;
font-size:32px;
font-weight:bold;
}

.library img{
width:40px;
margin-right:10px;
}

.site-title{
text-align:center;
font-size:20px;
font-weight:bold;
}

.auth{
display:flex;
justify-content:flex-end;
align-items:center;
}

.auth a{
text-decoration:none;
color:black;
font-size:14px;
font-weight:bold;
display:flex;
align-items:center;
gap:6px;
margin-left:18px;
}

.auth img{
width:16px;
}

/* 메뉴 */

.menu{
background:#f1f3f5;
display:flex;
justify-content:space-around;
padding:16px 0;
border-top:1px solid #e0e0e0;
border-bottom:1px solid #e0e0e0;
}

.menu a{
color:#000;
text-decoration:none;
font-weight:bold;
font-size:16px;
display:flex;
align-items:center;
gap:8px;
}

.menu img{
width:20px;
}

/* 회원가입 영역 */

.signup-section{
max-width:1000px;
margin:60px auto;
background:white;
border-radius:12px;
padding:40px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

/* 상단 탭 */

.signup-tabs{
display:flex;
gap:10px;
margin-bottom:40px;
}

.signup-tabs a{
flex:1;
text-align:center;
padding:14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
background:#e9ecef;
color:#555;
}

.signup-tabs .active{
background:#16a085;
color:white;
}

/* 폼 */

.signup-form{
max-width:500px;
margin:0 auto;
}

.input-box{
display:flex;
align-items:center;
margin-bottom:18px;
}

.input-box img{
width:20px;
margin-right:10px;
}

.input-box input{
flex:1;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

/* 이메일 */

.email-box{
display:flex;
gap:8px;
}

.email-box input{
flex:1;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
}

.email-box select{
padding:12px;
border:1px solid #ccc;
border-radius:6px;
}

/* 버튼 */

.signup-btn{
margin-top:20px;
width:100%;
padding:14px;
background:#16a085;
border:none;
color:white;
font-size:16px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

.signup-btn:hover{
background:#138d75;
}

/* 안내 */

.signup-info{
margin-top:40px;
background:#f8f9fa;
padding:20px;
border-radius:10px;
font-size:14px;
text-align:center;
}

</style>

<script>

document.addEventListener("contextmenu",e=>e.preventDefault());

document.addEventListener("keydown",function(e){
if(e.ctrlKey && e.key==="c") e.preventDefault();
if(e.ctrlKey && e.key==="s") e.preventDefault();
if(e.ctrlKey && e.key==="u") e.preventDefault();
});

</script>

</head>

<body>

<header>

<div class="top-bar">

<div class="library">
<a href="index.html">
<img src="아파트 도서관 로고.1.1.png">
다온 작은도서관
</a>
</div>

<div class="site-title">
월간독서퀴즈
</div>

<div class="auth">
<a href="login.html"><img src="로그인.png">로그인</a>
<a href="signup.html"><img src="회원가입.png">회원가입</a>
</div>

</div>

<nav class="menu">

<a href="#"><img src="도서관 안내.png">도서관 안내</a>
<a href="#"><img src="이달의 선정도서.png">이달의 선정도서</a>
<a href="#"><img src="당첨자 목록.png">당첨자 목록</a>
<a href="#"><img src="공지사항.png">공지사항</a>

</nav>

</header>

<section class="signup-section">

<div class="signup-tabs">
<a href="login.html">로그인</a>
<a class="active">회원가입</a>
<a>아이디/비밀번호 찾기</a>
</div>

<div class="signup-form">

<div class="input-box">
<img src="회원가입.png">
<input type="text" placeholder="아이디">
</div>

<div class="input-box">
<img src="로그인.png">
<input type="password" placeholder="비밀번호">
</div>

<div class="input-box">
<img src="로그인.png">
<input type="password" placeholder="비밀번호 확인">
</div>

<div class="input-box">
<img src="회원가입.png">
<input type="text" placeholder="이름">
</div>

<div class="input-box">

<div class="email-box">

<input type="text" placeholder="example">

<span>@</span>

<input type="text" placeholder="직접입력">

<select>
<option>naver.com</option>
<option>gmail.com</option>
<option>daum.net</option>
<option>직접입력</option>
</select>

</div>

</div>

<button class="signup-btn">
회원가입
</button>

</div>

<div class="signup-info">
회원가입 후 로그인하여 월간독서퀴즈에 참여하실 수 있습니다.
</div>

</section>

</body>
</html>
